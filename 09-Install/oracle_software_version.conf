# =============================================================================
# oracle_software_version.conf – FMW 14.1.2 software versions and patch numbers
# =============================================================================
# This file defines WHAT to download. It can be committed to git – no credentials.
#
# TWO download sources:
#   [eDelivery]   https://edelivery.oracle.com  – base installers (V*.zip)
#   [getMOSPatch] getMOSPatch.jar               – OPatch + individual patches
#
# MOS credentials: environment.conf (MOS_USER) + mos_sec.conf.des3 (password)
# Used by: 09-Install/04-oracle_pre_download.sh
# =============================================================================

# --- getMOSPatch platform configuration [getMOSPatch] ------------------------
MOS_PLATFORM="226P"      # 226P = Linux x86-64 | 233P = Linux ARM 64 | 46P = Windows x86-64
MOS_LANGUAGE="4L"        # 4L = German (D) | 1 = English

# =============================================================================
# INSTALLER ENVIRONMENT OVERRIDES
# =============================================================================
# CV_ASSUME_DISTID: instructs the Oracle CV (Configuration Validation) checker
# to treat this system as OEL8. Required on Oracle Linux 9 because the installer
# CV tool does not natively recognise OL9.
# Set only for the duration of the installer run (export/unset in install script).
# No official Oracle Note known; widely used in practice for FMW 14.1.2 on OL9.
CV_ASSUME_DISTID="OEL8"

# =============================================================================
# BASE INSTALLERS – download from Oracle Software Delivery Cloud (eDelivery)
# https://edelivery.oracle.com
# Unzip into $PATCH_STORAGE/wls/ resp. $PATCH_STORAGE/fr/ before running installer.
# =============================================================================

# --- Oracle Fusion Middleware Infrastructure 14.1.2 [eDelivery] --------------
# eDelivery search: Oracle Fusion Middleware Infrastructure 14.1.2.0.0 for Linux x86-64
FMW_INFRA_EDEL_SEARCH="Oracle Fusion Middleware Infrastructure 14.1.2.0.0 for Linux x86-64"
FMW_INFRA_ZIP="V1045135-01.zip"
FMW_INFRA_FILENAME="fmw_14.1.2.0.0_infrastructure.jar"   # extracted from ZIP
FMW_INFRA_SHA256="1AAE35167BDED101E7194AA3D75C26B292010035A36C289A3F90B663D84E68BD"

# --- Oracle Forms and Reports 14.1.2 [eDelivery] -----------------------------
# eDelivery search: Oracle Forms and Reports 14.1.2.0.0
# Only needed when INSTALL_COMPONENTS = FORMS_AND_REPORTS | FORMS_ONLY | REPORTS_ONLY
FMW_FR_EDEL_SEARCH="Oracle Forms and Reports 14.1.2.0.0"
FMW_FR_ZIP="V1045121-01.zip"
FMW_FR_FILENAME="fmw_14.1.2.0.0_fr_linux64.bin"          # extracted from ZIP
FMW_FR_SHA256="01D7A1042F0896FA5BDDD1EA268C1B60452476032819AAA307A789B15373175B"
# Note: same ZIP is shown as "Oracle Forms 14.1.2.0.0" and "Oracle Reports 14.1.2.0.0" on eDelivery

# =============================================================================
# OPATCH – download from MOS via getMOSPatch
# Patch 6880880 is the permanent OPatch download number (all versions).
# Always update OPatch BEFORE applying any patches.
# =============================================================================

OPATCH_PATCH_NR="6880880"
OPATCH_VERSION_MIN="13.9.4.2.17"  # minimum required by CPU Jan 2026 (Patch 38566996)
OPATCH_VERSION_INSTALL="13.9.4.2.22"  # version actually installed by OPATCH_UPGRADE_PATCH_NR

# Patch 28186730: OPatch 13.9.4.2.22 for FMW/WLS 12.2.1.4.0, 14.1.1.0.0, 14.1.2.0.0
# This is the FMW/WLS-specific OPatch upgrade patch (since OPatch >= 13.6 uses OUI tooling).
# When unzipped it contains a 6880880/ directory with opatch_generic.jar.
# Download via getMOSPatch alongside the other patches.
OPATCH_UPGRADE_PATCH_NR="28186730"

# Filename regexp for getMOSPatch to select the correct build from patch 6880880 (legacy).
# OPatch 13.9.x Generic is the WLS/FMW variant; the DB-specific Linux ZIPs are not needed.
# Matches: p6880880_139000_Generic.zip
OPATCH_REGEXP="p6880880_139000_Generic"

# =============================================================================
# POST-INSTALL PATCHES – apply via OPatch after FMW installation
# Apply in the order listed. Check each patch README for prerequisites.
# =============================================================================

# --- CPU January 2026 – UMS Bundle Patch -------------------------------------
# 38566996  UMS Bundle Patch 14.1.2.0.251022  (OPatch >= 13.9.4.2.17)
#           Source: CPU Jan 2026 → cpujan2026.html#AppendixFMW → Doc KA1182
#           MOS: https://support.oracle.com/support/?patchId=38566996

# Apply order: list patches in the order OPatch must apply them.
INSTALL_PATCHES="38566996"

# Minimum OPatch version required by the current INSTALL_PATCHES set
# (matches OPATCH_VERSION_MIN above – kept here for documentation clarity)
OPATCH_PATCHES_MIN="13.9.4.2.17"

# --- Forms & Reports specific patches ----------------------------------------
# Used by: 06-oracle_patch_forms_reports.sh
# Leave empty if no FR-specific patches are needed beyond INSTALL_PATCHES.
# F&R shares ORACLE_HOME with WLS — INSTALL_PATCHES patches are already
# applied to the full home. Add FR-specific patch numbers here if the current
# CPU includes FR-only components not covered by INSTALL_PATCHES.
INSTALL_PATCHES_FR=""
