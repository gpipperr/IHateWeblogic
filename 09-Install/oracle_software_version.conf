# =============================================================================
# oracle_software_version.conf – FMW 14.1.2 software versions and patch numbers
# =============================================================================
# This file defines WHAT to download from My Oracle Support (MOS).
# It can be committed to git – it contains no credentials.
#
# Used by: 09-Install/04-oracle_pre_download.sh
# MOS credentials are in: mos_sec.conf.des3  (encrypted, not in git)
#
# How to find patch numbers:
#   MOS → Patches & Updates → search by product "Oracle Fusion Middleware"
#   or use the ARU links in the Oracle Forms & Reports 14.1.2 install guide.
#
# Platform codes for getMOSPatch.cfg:
#   226P = Linux x86-64
#   233P = Linux ARM 64
#    46P = Windows x86-64
# =============================================================================

# --- getMOSPatch platform configuration --------------------------------------
MOS_PLATFORM="226P"      # Linux x86-64
MOS_LANGUAGE="4L"        # German (D); use "1" for English

# --- FMW Infrastructure (WebLogic + JRF) -------------------------------------
# MOS patch number for fmw_14.1.2.0.0_infrastructure.jar
# Find at: MOS → Patches → "Oracle Fusion Middleware Infrastructure 14.1.2.0.0"
FMW_INFRA_PATCH_NR=""
FMW_INFRA_FILENAME="fmw_14.1.2.0.0_infrastructure.jar"
FMW_INFRA_SHA256=""      # copy from the README inside the MOS download

# --- Oracle Forms and Reports ------------------------------------------------
# MOS patch number for fmw_14.1.2.0.0_fr_linux64.bin
# Only needed when INSTALL_COMPONENTS=FORMS_AND_REPORTS or FORMS_ONLY or REPORTS_ONLY
FMW_FR_PATCH_NR=""
FMW_FR_FILENAME="fmw_14.1.2.0.0_fr_linux64.bin"
FMW_FR_SHA256=""         # copy from the README inside the MOS download

# --- OPatch ------------------------------------------------------------------
# Patch 6880880 is the standard OPatch download (always this number)
OPATCH_PATCH_NR="6880880"
OPATCH_VERSION_MIN="13.9.4.0.0"   # minimum required for FMW 14.1.2

# --- Post-install patches (applied via OPatch after FMW installation) --------
# Comma-separated patch numbers, in apply order (check README for prerequisites).
# Example: INSTALL_PATCHES="33735326,34374498"
# Leave empty if no patches are required.
INSTALL_PATCHES=""
